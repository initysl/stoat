name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      UV_LINK_MODE: copy
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Verify tag matches package version
      run: |
        TAG_VERSION="${GITHUB_REF_NAME#v}"
        PACKAGE_VERSION=$(python3 - <<'PY'
from pathlib import Path
import tomllib

data = tomllib.loads(Path("pyproject.toml").read_text())
print(data["project"]["version"])
PY
)
        test "$TAG_VERSION" = "$PACKAGE_VERSION"

    - name: Verify changelog contains release heading
      run: |
        TAG_VERSION="${GITHUB_REF_NAME#v}"
        grep -Eq "^## ${TAG_VERSION} - [0-9]{4}-[0-9]{2}-[0-9]{2}$" CHANGELOG.md

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Run tests
      run: uv run pytest -q

    - name: Build package
      run: uv run python -Im build --sdist --wheel --outdir dist

    - name: Smoke test wheel install
      run: |
        uv venv .venv-smoke
        uv pip install --python .venv-smoke/bin/python dist/*.whl
        .venv-smoke/bin/stoat version
        .venv-smoke/bin/stoat doctor --json

    - name: Publish to PyPI
      env:
        UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
      run: uv publish
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*
        generate_release_notes: true
