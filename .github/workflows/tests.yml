name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      UV_LINK_MODE: copy
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Run tests
      run: uv run pytest --cov=stoat --cov-report=xml

    - name: Build package
      run: uv run python -Im build --sdist --wheel --outdir dist

    - name: Smoke test wheel install
      run: |
        uv venv .venv-smoke
        uv pip install --python .venv-smoke/bin/python dist/*.whl
        .venv-smoke/bin/stoat version
        .venv-smoke/bin/stoat doctor --json

    - name: Upload coverage
      uses: codecov/codecov-action@v3
