[llm]
model = "llama3.2:3b-instruct-q4_K_M"
base_url = "http://localhost:11434"
temperature = 0.1
max_tokens = 512
timeout = 30

[safety]
require_confirmation = ["delete", "uninstall", "move_multiple"]
protected_paths = ["/etc", "/usr", "/bin", "/boot", "/sys", "/proc"]
max_batch_size = 100
enable_undo = true

[search]
index_hidden_files = false
max_results = 50
use_locate = true
fuzzy_threshold = 0.6

[logging]
level = "INFO"
format = "json"
file = "~/.local/share/stoat/logs/stoat.log"
max_size_mb = 10
backup_count = 5

[undo]
max_history = 50
retention_days = 7
storage_path = "~/.cache/stoat/undo"
